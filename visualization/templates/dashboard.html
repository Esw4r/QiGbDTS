<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gossip-Based Distributed Task Scheduler</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0b1120; font-family: 'Segoe UI', system-ui, sans-serif; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const socket = io();
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;
let W, H;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  layoutNodes();
}
window.addEventListener('resize', resize);

// ── State ───────────────────────────────────────────────────
const nodes = {};
const peerLinks = new Set();
let dots = [];
let cloudTaskCount = 0;

// Cloud position (set in layoutNodes)
let cloudX = 0, cloudY = 0;

function ensureNode(id) {
  if (!nodes[id]) {
    nodes[id] = { x: 0, y: 0, tasks_running: 0, tasks_completed: 0,
                  connected_peers: [], alive: true, ip: '' };
    layoutNodes();
  }
}

function layoutNodes() {
  const ids = Object.keys(nodes);
  const n = ids.length;
  if (n === 0) { cloudX = W / 2; cloudY = 100; return; }
  const cx = W / 2, cy = H / 2 + 30;
  const r = Math.min(W, H) * 0.26;
  ids.forEach((id, i) => {
    const angle = -Math.PI / 2 + (2 * Math.PI * i) / n;
    nodes[id].x = cx + r * Math.cos(angle);
    nodes[id].y = cy + r * Math.sin(angle);
  });
  // Cloud sits above the ring
  cloudX = W / 2;
  cloudY = cy - r - 110;
}

// ── Drawing helpers ─────────────────────────────────────────

function drawLink(a, b, active) {
  if (!nodes[a] || !nodes[b]) return;
  ctx.beginPath();
  ctx.moveTo(nodes[a].x, nodes[a].y);
  ctx.lineTo(nodes[b].x, nodes[b].y);
  ctx.strokeStyle = active ? 'rgba(100,140,220,0.25)' : 'rgba(60,70,100,0.12)';
  ctx.lineWidth = active ? 1.5 : 1;
  ctx.setLineDash(active ? [] : [5, 5]);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawCloud() {
  const x = cloudX, y = cloudY;

  // Cloud shape — simple rounded blob
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y - 4, 28, Math.PI * 0.5, Math.PI * 1.5);
  ctx.arc(x - 14, y - 24, 18, Math.PI * 1.1, Math.PI * 1.85);
  ctx.arc(x + 6, y - 30, 20, Math.PI * 1.2, Math.PI * 1.9);
  ctx.arc(x + 20, y - 18, 16, Math.PI * 1.5, Math.PI * 0.4);
  ctx.arc(x, y - 4, 28, Math.PI * 1.5, Math.PI * 0.5);
  ctx.closePath();
  ctx.fillStyle = 'rgba(80,120,200,0.15)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(100,150,255,0.35)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();

  // Cloud emoji icon
  ctx.font = '32px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('☁️', x, y - 14);

  // Label
  ctx.font = '600 13px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = 'rgba(140,170,220,0.8)';
  ctx.textAlign = 'center';
  ctx.fillText('Cloud', x, y + 22);

  // Task counter
  ctx.font = '11px monospace';
  ctx.fillStyle = 'rgba(100,140,200,0.6)';
  ctx.fillText(cloudTaskCount + ' tasks', x, y + 38);
}

function drawNode(id) {
  const n = nodes[id];
  const x = n.x, y = n.y;
  const R = 30;
  const alive = n.alive;

  // Simple flat circle
  ctx.beginPath();
  ctx.arc(x, y, R, 0, Math.PI * 2);
  ctx.fillStyle = alive ? 'rgba(50,100,180,0.85)' : 'rgba(120,40,40,0.7)';
  ctx.fill();
  ctx.strokeStyle = alive ? 'rgba(100,160,255,0.4)' : 'rgba(200,80,80,0.3)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Icon
  ctx.font = '18px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText('🖥', x, y - 3);

  // Running task count inside
  ctx.font = '700 10px monospace';
  ctx.fillStyle = alive ? 'rgba(180,220,255,0.9)' : 'rgba(200,120,120,0.7)';
  ctx.fillText(n.tasks_running, x, y + 13);

  // Node ID below
  ctx.font = '600 12px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#b0bdd0';
  ctx.fillText(id, x, y + R + 16);

  // Status dot
  ctx.beginPath();
  ctx.arc(x + R * 0.6, y - R * 0.6, 4, 0, Math.PI * 2);
  ctx.fillStyle = alive ? '#4ade80' : '#f87171';
  ctx.fill();
}

function drawDot(dot) {
  let fromX, fromY, toX, toY;

  if (dot.toCloud) {
    // Animate toward cloud
    const fromNode = nodes[dot.from];
    if (!fromNode) return;
    fromX = fromNode.x; fromY = fromNode.y;
    toX = cloudX; toY = cloudY;
  } else {
    const from = nodes[dot.from];
    const to = nodes[dot.to];
    if (!from || !to) return;
    fromX = from.x; fromY = from.y;
    toX = to.x; toY = to.y;
  }

  const t = Math.min(dot.progress, 1);
  const x = fromX + (toX - fromX) * t;
  const y = fromY + (toY - fromY) * t;

  // Dot
  ctx.beginPath();
  ctx.arc(x, y, 4, 0, Math.PI * 2);
  ctx.fillStyle = dot.color;
  ctx.fill();

  // Label
  ctx.font = '700 7px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.textAlign = 'center';
  ctx.fillText(dot.task_id.slice(0, 5), x, y - 9);
}

// ── Main draw loop ──────────────────────────────────────────

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Title
  ctx.font = '600 16px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = 'rgba(140,170,220,0.7)';
  ctx.textAlign = 'center';
  ctx.fillText('Gossip-Based Distributed Task Scheduler', W / 2, 28);
  ctx.font = '11px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = 'rgba(80,100,140,0.5)';
  ctx.fillText('Peer-to-peer scheduling via gossip protocol', W / 2, 46);

  // Links between edge nodes
  const ids = Object.keys(nodes);
  for (let i = 0; i < ids.length; i++) {
    for (let j = i + 1; j < ids.length; j++) {
      const active = peerLinks.has(ids[i]+'->'+ids[j]) || peerLinks.has(ids[j]+'->'+ids[i]);
      drawLink(ids[i], ids[j], active);
    }
  }

  // Dashed lines from each node to cloud
  ids.forEach(id => {
    const n = nodes[id];
    ctx.beginPath();
    ctx.moveTo(n.x, n.y);
    ctx.lineTo(cloudX, cloudY);
    ctx.strokeStyle = 'rgba(80,120,200,0.08)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 6]);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Cloud
  drawCloud();

  // Edge nodes
  ids.forEach(id => drawNode(id));

  // Advance and draw dots
  const keep = [];
  for (const dot of dots) {
    dot.progress += 0.014;
    if (dot.progress < 1.0) {
      drawDot(dot);
      keep.push(dot);
    }
  }
  dots = keep;

  requestAnimationFrame(draw);
}

// ── SocketIO handlers ───────────────────────────────────────

socket.on('node_status', (data) => {
  const id = data.node_id;
  ensureNode(id);
  nodes[id].tasks_running = data.tasks_running;
  nodes[id].tasks_completed = data.tasks_completed;
  nodes[id].alive = true;

  const peers = data.connected_peers || [];
  peers.forEach(pid => {
    ensureNode(pid);
    peerLinks.add(id + '->' + pid);
  });
});

socket.on('event', (data) => {
  const d = data.data || {};
  const type = data.event_type;

  // Task offload between edge nodes
  if (type === 'task_offload' && d.from && d.to) {
    ensureNode(d.from);
    ensureNode(d.to);
    dots.push({
      task_id: d.task_id || '?',
      from: d.from,
      to: d.to,
      progress: 0,
      color: '#f59e0b',
      toCloud: false,
    });
  }

  // Task received
  if (type === 'task_received' && d.from && d.to) {
    ensureNode(d.from);
    ensureNode(d.to);
  }

  // Local task → animate to cloud (no peer available)
  if (type === 'task_local') {
    const nodeId = d.node || d.from;
    ensureNode(nodeId);
    cloudTaskCount++;
    dots.push({
      task_id: d.task_id || '?',
      from: nodeId,
      to: null,
      progress: 0,
      color: 'rgba(100,160,255,0.8)',
      toCloud: true,
    });
  }
});

// ── Init ────────────────────────────────────────────────────
resize();
draw();
</script>
</body>
</html>
