<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gossip-Based Distributed Task Scheduler</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080c14;
    --text: #d8dff0;
    --dim: #5a6380;
    --edge-col: #00bfff;
    --offload-col: #ff9800;
    --high-col: #ff1744;
    --green: #00e676;
    --red: #ff5252;
    --accent: #6c63ff;
    --cyan: #00e5ff;
  }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const socket = io();
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;
let W, H;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  layoutNodes();
}
window.addEventListener('resize', resize);

// ── Node state ──────────────────────────────────────────────
// Dynamically populated from node_status events
const nodes = {};          // id -> {x, y, tasks_running, tasks_completed, connected_peers, alive}
const peerLinks = new Set(); // "a->b" strings
let dots = [];             // animated task movement dots

function ensureNode(id) {
  if (!nodes[id]) {
    nodes[id] = { x: 0, y: 0, tasks_running: 0, tasks_completed: 0,
                  connected_peers: [], alive: true, ip: '' };
    layoutNodes();
  }
}

function layoutNodes() {
  const ids = Object.keys(nodes);
  const n = ids.length;
  if (n === 0) return;
  const cx = W / 2, cy = H / 2;
  const r = Math.min(W, H) * 0.30;
  ids.forEach((id, i) => {
    const angle = -Math.PI / 2 + (2 * Math.PI * i) / n;
    nodes[id].x = cx + r * Math.cos(angle);
    nodes[id].y = cy + r * Math.sin(angle);
  });
}

// ── Drawing ─────────────────────────────────────────────────
function drawLink(a, b, active) {
  if (!nodes[a] || !nodes[b]) return;
  ctx.beginPath();
  ctx.moveTo(nodes[a].x, nodes[a].y);
  ctx.lineTo(nodes[b].x, nodes[b].y);
  if (active) {
    ctx.strokeStyle = 'rgba(108,99,255,0.28)';
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
  } else {
    ctx.strokeStyle = 'rgba(90,99,128,0.12)';
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 6]);
  }
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawNode(id) {
  const n = nodes[id];
  const x = n.x, y = n.y;
  const R = 36;
  const alive = n.alive;

  // Glow
  const glow = ctx.createRadialGradient(x, y, R * 0.3, x, y, R * 2.2);
  glow.addColorStop(0, alive ? 'rgba(0,191,255,0.18)' : 'rgba(255,82,82,0.12)');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(x, y, R * 2.2, 0, Math.PI * 2);
  ctx.fill();

  // Outer ring — task count indicator
  const taskAngle = Math.min(n.tasks_running / 4, 1) * Math.PI * 2;
  if (taskAngle > 0) {
    ctx.beginPath();
    ctx.arc(x, y, R + 6, -Math.PI / 2, -Math.PI / 2 + taskAngle);
    ctx.strokeStyle = alive ? 'rgba(0,229,255,0.6)' : 'rgba(255,82,82,0.4)';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // Circle
  ctx.beginPath();
  ctx.arc(x, y, R, 0, Math.PI * 2);
  const grad = ctx.createLinearGradient(x - R, y - R, x + R, y + R);
  if (alive) {
    grad.addColorStop(0, '#0088cc');
    grad.addColorStop(1, '#00bfff');
  } else {
    grad.addColorStop(0, '#661a1a');
    grad.addColorStop(1, '#993333');
  }
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Icon
  ctx.font = '22px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = alive ? '#fff' : 'rgba(255,255,255,0.4)';
  ctx.fillText('🖥', x, y);

  // Node ID
  ctx.font = '700 13px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#c8d0e8';
  ctx.fillText(id, x, y + R + 18);

  // IP address
  if (n.ip) {
    ctx.font = '10px "Consolas", monospace';
    ctx.fillStyle = alive ? 'rgba(0,229,255,0.65)' : 'rgba(255,82,82,0.5)';
    ctx.fillText(n.ip, x, y + R + 32);
  }

  // Task count inside circle
  ctx.font = '700 11px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText(n.tasks_running, x, y + R * 0.35);

  // Status dot
  ctx.beginPath();
  ctx.arc(x + R * 0.65, y - R * 0.65, 5, 0, Math.PI * 2);
  ctx.fillStyle = alive ? '#00e676' : '#ff5252';
  ctx.fill();
}

function drawDot(dot) {
  const from = nodes[dot.from];
  const to = nodes[dot.to];
  if (!from || !to) return;

  const t = Math.min(dot.progress, 1);
  const x = from.x + (to.x - from.x) * t;
  const y = from.y + (to.y - from.y) * t;

  // Trail glow
  const trail = ctx.createRadialGradient(x, y, 0, x, y, 12);
  trail.addColorStop(0, dot.color);
  trail.addColorStop(1, 'transparent');
  ctx.fillStyle = trail;
  ctx.beginPath();
  ctx.arc(x, y, 12, 0, Math.PI * 2);
  ctx.fill();

  // Dot
  ctx.beginPath();
  ctx.arc(x, y, 5, 0, Math.PI * 2);
  ctx.fillStyle = dot.color;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Label
  ctx.font = '700 8px monospace';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText(dot.task_id.slice(0, 5), x, y - 12);
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Title
  ctx.font = '700 18px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = 'rgba(108,99,255,0.7)';
  ctx.textAlign = 'center';
  ctx.fillText('⚛ Gossip-Based Distributed Task Scheduler', W / 2, 32);
  ctx.font = '12px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = 'rgba(90,99,128,0.6)';
  ctx.fillText('Peer-to-peer scheduling via gossip protocol — live network view', W / 2, 52);

  // Draw all possible links
  const ids = Object.keys(nodes);
  for (let i = 0; i < ids.length; i++) {
    for (let j = i + 1; j < ids.length; j++) {
      const active = peerLinks.has(ids[i]+'->'+ids[j]) || peerLinks.has(ids[j]+'->'+ids[i]);
      drawLink(ids[i], ids[j], active);
    }
  }

  // Draw nodes
  ids.forEach(id => drawNode(id));

  // Advance and draw dots
  const keep = [];
  for (const dot of dots) {
    dot.progress += 0.012;
    if (dot.progress < 1.0) {
      drawDot(dot);
      keep.push(dot);
    }
  }
  dots = keep;

  requestAnimationFrame(draw);
}

// ── SocketIO handlers ───────────────────────────────────────
socket.on('node_status', (data) => {
  const id = data.node_id;
  ensureNode(id);
  nodes[id].tasks_running = data.tasks_running;
  nodes[id].tasks_completed = data.tasks_completed;
  nodes[id].alive = true;

  // Update peer links
  const peers = data.connected_peers || [];
  peers.forEach(pid => {
    ensureNode(pid);
    peerLinks.add(id + '->' + pid);
  });
});

socket.on('event', (data) => {
  const d = data.data || {};
  const type = data.event_type;

  // Task offload — animate a dot from -> to
  if (type === 'task_offload' && d.from && d.to) {
    ensureNode(d.from);
    ensureNode(d.to);
    dots.push({
      task_id: d.task_id || '?',
      from: d.from,
      to: d.to,
      progress: 0,
      color: '#ff9800',
    });
  }

  // Task received — just ensure nodes exist
  if (type === 'task_received' && d.from && d.to) {
    ensureNode(d.from);
    ensureNode(d.to);
  }

  // Local task — small pulse (handled by task count update)
  if (type === 'task_local') {
    ensureNode(d.node || d.from);
  }
});

// ── Init ────────────────────────────────────────────────────
resize();
draw();
</script>
</body>
</html>
